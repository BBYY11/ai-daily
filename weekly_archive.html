<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Daily · 周报归档</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  .stats {
    display: flex;
    gap: 24px;
    margin: 20px 0;
    padding: 16px 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
  }
  .stat .v { font-family: var(--mono); font-size: 22px; color: var(--blue); font-weight: 700; }
  .stat .l { font-size: 11px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }

  .week-list { display: flex; flex-direction: column; gap: 0; border-top: 1px solid var(--line); }
  .week-row {
    display: grid;
    grid-template-columns: 160px 1fr 80px 100px;
    gap: 16px;
    padding: 20px 16px;
    border-bottom: 1px solid var(--line);
    align-items: center;
    transition: 0.15s;
    text-decoration: none;
    color: var(--text);
    position: relative;
  }
  .week-row:hover { background: var(--bg-2); text-decoration: none; }
  .week-row:hover .w-title { color: var(--blue); }
  .week-row::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: transparent; transition: 0.15s; }
  .week-row:hover::before { background: var(--blue); }

  .w-week { font-family: var(--mono); font-size: 16px; color: var(--blue); font-weight: 700; }
  .w-range { font-family: var(--mono); font-size: 11px; color: var(--text-mute); margin-top: 2px; }
  .w-body { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .w-title { font-size: 14px; color: var(--text-dim); line-height: 1.6; }
  .w-num { font-family: var(--mono); font-size: 14px; color: var(--text-mute); text-align: right; }
  .w-num strong { color: var(--blue); font-size: 18px; font-weight: 700; }
  .w-num small { font-size: 10px; }
  .w-action { font-family: var(--mono); font-size: 12px; color: var(--blue); text-align: right; font-weight: 600; }

  @media (max-width: 600px) {
    .week-row { grid-template-columns: 100px 1fr; gap: 12px; padding: 16px 12px; }
    .week-row .w-num, .week-row .w-action { display: none; }
    .w-week { font-size: 14px; }
  }
</style>
</head>
<body>
<div class="top-stripe"></div>
<div class="wrap">
  <header>
    <a href="index.html" class="logo">
      <span class="logo-mark">AI</span>
      <span class="logo-text">
        <span class="t1">AI Daily</span>
        <span class="t2">· 周报归档</span>
      </span>
    </a>
    <button class="nav-toggle" id="nav-toggle" aria-label="菜单">≡</button>
    <nav class="nav" id="nav">
      <a href="index.html">今日</a>
      <a href="monthly.html">本月</a>
      <a href="archive.html">归档</a>
      <a href="weekly_archive.html" class="active">周报</a>
      <a href="feed.html" class="rss-link">⚡ 订阅</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-meta">
      <span class="pill">WEEKLY · 永久周报</span>
      <span>每周一 08:00 永久保存</span>
    </div>
    <h1>周报<span class="hl">归档</span></h1>
    <p class="lead">从 W22 (2026-05-25 → 2026-05-31) 开始,每周一 08:00 由 cron 自动归档,可下载 Markdown / JSON / 打印 3 种格式。</p>
  </section>

  <div class="stats">
    <div class="stat"><div class="v" id="s-weeks">—</div><div class="l">已存周报</div></div>
    <div class="stat"><div class="v" id="s-themes">—</div><div class="l">累计主题</div></div>
    <div class="stat"><div class="v" id="s-latest">—</div><div class="l">最新周次</div></div>
  </div>

  <div class="week-list" id="week-list"></div>

  <footer>© 2026 AI Daily · 周报永久归档 · 每周一 08:00 由 cron 任务自动追加</footer>
</div>

<script>
fetch("data/archive/weekly/index.json")
  .then(r => r.ok ? r.json() : { weeks: [] })
  .then(d => {
    const weeks = d.weeks || [];
    document.getElementById("s-weeks").textContent = d.total || weeks.length;
    document.getElementById("s-themes").textContent = weeks.reduce((s, w) => s + (w.key_themes_count || 0), 0);
    document.getElementById("s-latest").textContent = weeks[0] ? weeks[0].week : "—";

    if (!weeks.length) {
      document.getElementById("week-list").innerHTML = '<div class="empty">还没有归档周报。等待下周一 8 点的 cron 任务跑完后会显示。</div>';
    } else {
      document.getElementById("week-list").innerHTML = weeks.map(w => `
        <a class="week-row" href="weekly_view.html?week=${w.week}">
          <div>
            <div class="w-week">${w.week}</div>
            <div class="w-range">${w.start_date} → ${w.end_date}</div>
          </div>
          <div class="w-body">
            <div class="w-title">${escapeHTML(w.summary || '(无摘要)')}</div>
          </div>
          <div class="w-num"><strong>${w.key_themes_count || 0}</strong><br><small>主题</small></div>
          <div class="w-action">查看 / 下载 →</div>
        </a>
      `).join("");
    }

    // nav toggle
    const btn = document.getElementById("nav-toggle");
    const nav = document.getElementById("nav");
    if (btn) {
      btn.addEventListener("click", () => nav.classList.toggle("open"));
      nav.querySelectorAll("a").forEach(a => a.addEventListener("click", () => nav.classList.remove("open")));
    }
  })
  .catch(err => {
    document.getElementById("week-list").innerHTML = '<div class="empty">加载失败:' + err.message + '</div>';
  });

function escapeHTML(s) { return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]); }
</script>
</body>
</html>
