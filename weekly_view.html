<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Daily · 周报详情</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  .meta-bar {
    margin: 20px 0 12px;
    padding: 12px 18px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
  }
  .meta-bar a { color: var(--blue); text-decoration: none; font-weight: 600; }
  .meta-bar a:hover { text-decoration: underline; }
  .meta-bar .sep { color: var(--text-mute); }

  /* 报告主体(白底打印友好) */
  .report {
    background: #fff;
    color: #1a1a1a;
    padding: 40px 48px;
    border-radius: 8px;
    margin-bottom: 24px;
    line-height: 1.75;
    font-family: var(--sans);
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
  }
  .report h1 { font-size: 26px; margin-bottom: 8px; color: #111; border-bottom: 3px solid #2563eb; padding-bottom: 10px; }
  .report h2 { font-size: 18px; margin: 24px 0 10px; color: #2563eb; border-bottom: 1px solid #eee; padding-bottom: 6px; }
  .report h3 { font-size: 15px; margin: 18px 0 8px; color: #333; }
  .report p { margin-bottom: 10px; text-align: left; }
  .report .date-range { font-size: 13px; color: #666; margin-bottom: 14px; }
  .report .summary-box { background: #eff6ff; border-left: 4px solid #2563eb; padding: 14px 18px; margin: 14px 0; border-radius: 4px; }
  .report .summary-box p { color: #1f2937; font-size: 14px; }
  .report .theme { margin: 14px 0; padding: 12px 16px; background: #f9fafb; border-left: 3px solid #4adfd1; border-radius: 4px; }
  .report .theme h4 { color: #2563eb; font-size: 15px; margin-bottom: 6px; }
  .report .theme p { color: #444; font-size: 13px; }
  .report table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 13px; }
  .report th { background: #f3f4f6; padding: 8px 12px; text-align: left; border-bottom: 2px solid #e5e7eb; color: #111; }
  .report td { padding: 8px 12px; border-bottom: 1px solid #f3f4f6; color: #4b5563; }
  .report .footer { margin-top: 28px; padding-top: 14px; border-top: 1px dashed #ddd; font-size: 11px; color: #999; }
  .report .day-link { color: #2563eb; text-decoration: none; }

  .actions { display: flex; gap: 10px; margin: 16px 0; flex-wrap: wrap; }
  .action-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: var(--bg);
    border: 1px solid var(--line-2);
    border-radius: 6px;
    color: var(--text);
    text-decoration: none;
    font-family: var(--mono);
    font-size: 13px;
    transition: 0.15s;
    cursor: pointer;
  }
  .action-btn:hover { border-color: var(--blue); background: var(--blue-soft); color: var(--blue); }
  .action-btn::before { content: "↓"; font-size: 16px; font-weight: 700; }
  .action-btn.print::before { content: "⎙"; }

  @media print {
    body { background: white; }
    header, .meta-bar, .actions, footer { display: none !important; }
    .wrap { padding: 0; max-width: 100%; }
    .report { box-shadow: none; border-radius: 0; padding: 20px; border: none; }
  }
  @media (max-width: 600px) {
    .report { padding: 20px; }
    .report h1 { font-size: 20px; }
    .report h2 { font-size: 16px; }
    .actions { flex-direction: column; }
    .action-btn { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <a href="index.html" class="logo"><span class="logo-dot"></span>AI DAILY <span class="logo-sub">· 周报详情</span></a>
    <button class="nav-toggle" id="nav-toggle" aria-label="菜单">≡</button>
    <nav class="nav" id="nav">
      <a href="index.html">今日</a>
      <a href="monthly.html">本月</a>
      <a href="archive.html">归档</a>
      <a href="weekly_archive.html" class="active">周报</a>
      <a href="feed.html" class="rss-link">⚡ 订阅</a>
    </nav>
  </header>

  <div id="content" class="empty">加载中...</div>
  <footer>© 2026 AI Daily · 周报永久归档 · 每周一 08:00 自动生成</footer>
</div>

<script>
const params = new URLSearchParams(location.search);
const week = params.get("week");

if (!week) {
  document.getElementById("content").innerHTML = '<div class="empty">缺少 week 参数。例:weekly_view.html?week=2026-W22</div>';
} else {
  fetch(`data/archive/weekly/${week}.json`)
    .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
    .then(d => {
      render(d);
      const btn = document.getElementById("nav-toggle");
      const nav = document.getElementById("nav");
      if (btn) {
        btn.addEventListener("click", () => nav.classList.toggle("open"));
        nav.querySelectorAll("a").forEach(a => a.addEventListener("click", () => nav.classList.remove("open")));
      }
    })
    .catch(err => {
      document.getElementById("content").innerHTML = `<div class="empty">未找到 ${week} 的周报:${err.message}<br><br><a href="weekly_archive.html">查看所有周报 →</a></div>`;
    });
}

function render(d) {
  const md = buildMarkdown(d);
  const html = buildHtmlReport(d);

  document.getElementById("content").innerHTML = `
    <div class="meta-bar">
      <a href="weekly_archive.html">← 所有周报</a>
      <span class="sep">·</span>
      <span>${escapeHTML(d.week || '')} ${escapeHTML(d.week_label || '')}</span>
      <span class="sep">·</span>
      <span>${d.start_date || ''} (${d.weekday_start || ''}) → ${d.end_date || ''} (${d.weekday_end || ''})</span>
      <span class="sep">·</span>
      <span>共 ${(d.key_themes || []).length} 个主题 · ${(d.day_links || []).length} 天</span>
    </div>

    <div class="actions">
      <button class="action-btn" id="dl-md">下载 Markdown (.md)</button>
      <button class="action-btn" id="dl-json">下载原始数据 (.json)</button>
      <button class="action-btn print" id="dl-print">打印友好版 (Ctrl+P)</button>
    </div>

    <article class="report" id="report-article">
      ${html}
    </article>
  `;

  document.getElementById("dl-md").addEventListener("click", () => downloadFile(`${d.week}-AI周报.md`, md, "text/markdown;charset=utf-8"));
  document.getElementById("dl-json").addEventListener("click", () => downloadFile(`${d.week}-AI周报.json`, JSON.stringify(d, null, 2), "application/json;charset=utf-8"));
  document.getElementById("dl-print").addEventListener("click", () => window.print());
}

function buildHtmlReport(d) {
  const themesHtml = (d.key_themes || []).map(t => `
    <div class="theme">
      <h4>${escapeHTML(t.title || '')}</h4>
      <p>${escapeHTML(t.body || '')}</p>
    </div>
  `).join("");

  const daysHtml = (d.day_links || []).map(day => `
    <tr>
      <td><strong>${day.date || ''}</strong></td>
      <td>${escapeHTML(day.weekday || '')}</td>
      <td>${escapeHTML(day.summary || '')}</td>
    </tr>
  `).join("");

  const dataH = d.data_highlights || {};
  const dataHtml = (Object.keys(dataH).length > 0) ? `
    <h3>关键数据</h3>
    <table>
      <tr><th>指标</th><th>值</th></tr>
      ${Object.entries(dataH).map(([k, v]) => `<tr><td>${escapeHTML(k)}</td><td>${escapeHTML(String(v))}</td></tr>`).join("")}
    </table>
  ` : "";

  return `
    <h1>AI 早报 · ${escapeHTML(d.week || '')} 周报</h1>
    <div class="date-range">${d.start_date || ''} (${d.weekday_start || ''}) → ${d.end_date || ''} (${d.weekday_end || ''}) · 由 AI Daily 自动生成</div>

    <h2>本周摘要</h2>
    <div class="summary-box">
      <p>${escapeHTML(d.summary || '(无摘要)')}</p>
    </div>

    <h2>本周 5 大主题</h2>
    ${themesHtml || '<p style="color:#999;">暂无主题</p>'}

    ${dataHtml}

    <h2>本周 7 天速览</h2>
    <table>
      <tr><th>日期</th><th>星期</th><th>头条</th></tr>
      ${daysHtml || '<tr><td colspan="3" style="text-align:center;color:#999;">暂无数据</td></tr>'}
    </table>

    <div class="footer">
      © 2026 AI Daily · 全球 AI 早报 · ${d.week || ''} 周报永久归档于 weekly_archive.html<br>
      生成时间:${escapeHTML(d.generated_at || '')}
    </div>
  `;
}

function buildMarkdown(d) {
  const themesMd = (d.key_themes || []).map((t, i) => `### ${i+1}. ${t.title || ''}\n\n${t.body || ''}\n`).join("\n");
  const daysMd = (d.day_links || []).map(day => `| ${day.date || ''} | ${day.weekday || ''} | ${day.summary || ''} |`).join("\n");
  const dataMd = d.data_highlights ? Object.entries(d.data_highlights).map(([k, v]) => `| ${k} | ${v} |`).join("\n") : "";

  return `# AI 早报 · ${d.week || ''} 周报

> ${d.start_date || ''} (${d.weekday_start || ''}) → ${d.end_date || ''} (${d.weekday_end || ''})
> 生成时间:${d.generated_at || ''}

## 本周摘要

${d.summary || ''}

## 本周 5 大主题

${themesMd}

${dataMd ? `## 关键数据

| 指标 | 值 |
|------|----|
${dataMd}
` : ''}

## 本周 7 天速览

| 日期 | 星期 | 头条 |
|------|------|------|
${daysMd || '| 暂无数据 | - | - |'}

---

*由 [AI Daily](https://bbyy11.github.io/ai-daily/) 自动生成 · ${d.week || ''} 周报永久归档*
`;
}

function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function escapeHTML(s) { return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]); }
</script>
</body>
</html>
