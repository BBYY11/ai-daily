<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Daily · 本月脉络</title>
<style>
  :root {
    --bg: #0a0a0c; --bg-2: #111114; --bg-3: #16161a;
    --line: #1f1f24; --line-2: #2a2a31;
    --text: #e8e6df; --text-dim: #9a9890; --text-mute: #5e5c56;
    --orange: #ff6a1a; --orange-soft: rgba(255, 106, 26, 0.12);
    --cyan: #4adfd1; --cyan-soft: rgba(74, 223, 209, 0.12);
    --magenta: #d65cd1; --magenta-soft: rgba(214, 92, 209, 0.12);
    --mono: "JetBrains Mono", "SF Mono", "Menlo", ui-monospace, monospace;
    --sans: "Inter", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
  .bg-fx { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .bg-fx::before { content: ""; position: absolute; inset: 0;
    background-image: linear-gradient(rgba(255, 106, 26, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 106, 26, 0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(ellipse at top, black 0%, transparent 70%);
  }
  .bg-fx::after { content: ""; position: absolute; top: -200px; left: 50%; transform: translateX(-50%); width: 1200px; height: 600px; border-radius: 50%; background: radial-gradient(ellipse, rgba(255, 106, 26, 0.18), transparent 60%); filter: blur(80px); }
  .wrap { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 0 32px; }

  header { padding: 28px 0; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--line); }
  .logo { font-family: var(--mono); font-size: 14px; letter-spacing: 0.18em; color: var(--text-dim); display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-dot { width: 8px; height: 8px; background: var(--orange); border-radius: 50%; box-shadow: 0 0 12px var(--orange); }
  .nav-links { display: flex; gap: 6px; }
  .nav-links a { font-family: var(--mono); font-size: 12px; color: var(--text-dim); text-decoration: none; padding: 6px 12px; border: 1px solid var(--line-2); border-radius: 6px; }
  .nav-links a:hover { color: var(--orange); border-color: var(--orange); }
  .nav-links a.active { color: var(--bg); background: var(--orange); border-color: var(--orange); }

  .hero { margin: 32px 0 24px; padding: 48px; border: 1px solid var(--line); border-radius: 16px; background: var(--bg-2); position: relative; overflow: hidden; }
  .hero::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--orange), transparent); background-size: 200% 100%; animation: scan 3s linear infinite; }
  @keyframes scan { 0% { background-position: 200% 0;} 100% { background-position: -200% 0;} }
  .hero-meta { font-family: var(--mono); font-size: 12px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.15em; }
  .hero h1 { font-size: 42px; margin: 12px 0 8px; font-weight: 800; letter-spacing: -0.01em; }
  .hero h1 .hl { color: var(--orange); }
  .hero p { font-size: 15px; color: var(--text-dim); line-height: 1.6; max-width: 760px; }

  /* ==== 块 1:上周摘要 ==== */
  .weekly-block { margin: 32px 0; }
  .block-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--orange); }
  .block-header .num { font-family: var(--mono); font-size: 13px; color: var(--orange); letter-spacing: 0.15em; padding: 4px 10px; border: 1px solid var(--orange); border-radius: 4px; }
  .block-header h2 { font-size: 26px; font-weight: 700; letter-spacing: -0.01em; }
  .block-header .sub { font-family: var(--mono); font-size: 12px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.15em; }
  .block-header .refresh-tag { font-family: var(--mono); font-size: 10px; padding: 3px 8px; background: var(--orange-soft); color: var(--orange); border: 1px solid var(--orange); border-radius: 4px; letter-spacing: 0.1em; }

  .weekly-summary-card { background: var(--bg-2); border: 1px solid var(--orange); border-radius: 12px; padding: 24px 28px; margin-bottom: 20px; }
  .weekly-summary-card .summary { font-size: 15px; color: var(--text); line-height: 1.85; }

  .weekly-themes { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .theme-card { background: var(--bg-2); border: 1px solid var(--line); border-radius: 8px; padding: 16px 20px; transition: 0.2s; }
  .theme-card:hover { border-color: var(--orange); }
  .theme-card h4 { font-size: 14px; color: var(--orange); margin-bottom: 8px; font-weight: 600; }
  .theme-card p { font-size: 13px; color: var(--text-dim); line-height: 1.7; }

  .day-links { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .day-link { background: var(--bg-2); border: 1px solid var(--line); border-radius: 6px; padding: 10px 12px; text-decoration: none; color: var(--text); transition: 0.2s; display: block; }
  .day-link:hover { border-color: var(--orange); background: var(--bg-3); transform: translateY(-2px); }
  .day-link .d-date { font-family: var(--mono); font-size: 11px; color: var(--orange); }
  .day-link .d-weekday { font-family: var(--mono); font-size: 9px; color: var(--text-mute); margin-left: 6px; }
  .day-link .d-summary { font-size: 11px; color: var(--text-dim); line-height: 1.5; margin-top: 6px; max-height: 60px; overflow: hidden; }

  /* ==== 块 2:已过完月份总结 ==== */
  .monthly-block { margin: 48px 0 24px; }

  .months { display: flex; flex-direction: column; gap: 20px; }
  .month-card { border: 1px solid var(--line); border-radius: 12px; padding: 28px; background: var(--bg-2); position: relative; overflow: hidden; transition: 0.2s; }
  .month-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: var(--line-2); }
  .month-card:hover { border-color: var(--orange); transform: translateY(-2px); box-shadow: 0 20px 40px -20px var(--orange-soft); }
  .month-header { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--line); }
  .month-date { font-family: var(--mono); font-size: 18px; color: var(--cyan); letter-spacing: 0.1em; font-weight: 600; min-width: 110px; }
  .month-title { font-size: 20px; font-weight: 700; flex: 1; }
  .month-summary { font-size: 14px; color: var(--text); line-height: 1.8; margin-bottom: 20px; }
  .month-body { display: grid; grid-template-columns: 1.5fr 1fr; gap: 24px; }
  .month-events-title { font-family: var(--mono); font-size: 11px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 10px; }
  .month-events { list-style: none; padding: 0; }
  .month-events li { font-size: 13px; color: var(--text-dim); line-height: 1.7; padding: 6px 0 6px 18px; position: relative; border-bottom: 1px dashed var(--line); }
  .month-events li:last-child { border-bottom: none; }
  .month-events li::before { content: "▸"; position: absolute; left: 0; color: var(--orange); }
  .month-aside { background: var(--bg-3); border: 1px solid var(--line); border-radius: 8px; padding: 18px; }
  .aside-label { font-family: var(--mono); font-size: 11px; color: var(--cyan); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 12px; }
  .data-points { list-style: none; padding: 0; margin-bottom: 16px; }
  .data-points li { font-family: var(--mono); font-size: 12px; color: var(--text); line-height: 1.6; padding: 4px 0; }
  .data-points li::before { content: "▎ "; color: var(--orange); }
  .look-ahead { font-size: 13px; color: var(--text-dim); line-height: 1.7; padding: 12px; background: var(--orange-soft); border-left: 3px solid var(--orange); border-radius: 4px; }
  .look-ahead-label { font-family: var(--mono); font-size: 10px; color: var(--orange); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 6px; display: block; }

  .empty { padding: 80px 0; text-align: center; color: var(--text-mute); font-family: var(--mono); }
  footer { margin-top: 60px; padding: 24px 0 48px; border-top: 1px solid var(--line); font-family: var(--mono); font-size: 11px; color: var(--text-mute); }

  @media (max-width: 900px) {
    .weekly-themes { grid-template-columns: 1fr; }
    .month-body { grid-template-columns: 1fr; }
    .day-links { grid-template-columns: repeat(2, 1fr); }
    .hero { padding: 32px 24px; }
    .hero h1 { font-size: 28px; }
  }
</style>
</head>
<body>
<div class="bg-fx"></div>
<div class="wrap">
  <header>
    <a href="index.html" class="logo"><span class="logo-dot"></span>AI DAILY · MONTHLY</a>
    <div class="nav-links">
      <a href="index.html">今日</a>
      <a href="monthly.html" class="active">本月</a>
      <a href="archive.html">归档</a>
    </div>
  </header>

  <div id="content" class="empty">加载中...</div>
  <footer>© 2026 AI Daily · 本月脉络 · 上周摘要(每周一更新)+ 已过完月份总结(每月最后一天更新)</footer>
</div>

<script>
const FALLBACK_TODAY = "2026-06-03";

(async () => {
  // 并行拉三个数据
  const [newsRes, weekRes, monthRes] = await Promise.all([
    fetch("data/news.json"),
    fetch("data/weekly_summary.json"),
    fetch("data/monthly_archive.json"),
  ]);
  const news = newsRes.ok ? await newsRes.json() : null;
  const week = weekRes.ok ? await weekRes.json() : null;
  const monthly = monthRes.ok ? await monthRes.json() : null;
  render({ news, week, monthly });
})().catch(err => {
  document.getElementById("content").innerHTML = '<div class="empty">加载失败:' + err.message + '</div>';
});

function render({ news, week, monthly }) {
  const todayDate = (news && news.date) || FALLBACK_TODAY;
  const todayWeekday = (news && news.weekday) || "";

  // 块 1:上周摘要
  const weekBlock = week ? `
    <section class="weekly-block">
      <div class="block-header">
        <span class="num">块 1</span>
        <h2>上周摘要</h2>
        <span class="sub">${week.week_label} · ${week.start_date} (${week.weekday_start}) → ${week.end_date} (${week.weekday_end})</span>
        <span class="refresh-tag">每周一 08:00 更新</span>
      </div>

      <div class="weekly-summary-card">
        <div class="summary">${escapeHTML(week.summary || "")}</div>
      </div>

      <div class="weekly-themes">
        ${(week.key_themes || []).map(t => `
          <div class="theme-card">
            <h4>▎ ${escapeHTML(t.title)}</h4>
            <p>${escapeHTML(t.body)}</p>
          </div>
        `).join("")}
      </div>

      <div class="day-links">
        ${(week.day_links || []).map(d => `
          <a class="day-link" href="archive-view.html?date=${d.date}">
            <div><span class="d-date">${d.date.slice(5)}</span><span class="d-weekday">${d.weekday}</span></div>
            <div class="d-summary">${escapeHTML(d.summary || "")}</div>
          </a>
        `).join("")}
      </div>
    </section>
  ` : '<div class="empty">上周摘要数据加载中(每周一 08:00 生成)</div>';

  // 块 2:已过完月份总结
  const months = (monthly && monthly.months) || [];
  // 月份倒序
  const sorted = [...months].sort((a, b) => b.date.localeCompare(a.date));
  const monthBlock = `
    <section class="monthly-block">
      <div class="block-header">
        <span class="num">块 2</span>
        <h2>已过完月份总结</h2>
        <span class="sub">${sorted.length ? sorted[sorted.length-1].date : ''} → ${sorted.length ? sorted[0].date : ''} · 共 ${sorted.length} 个月</span>
        <span class="refresh-tag">每月最后一天 08:00 更新</span>
      </div>

      <div class="months">
        ${sorted.map(m => `
          <div class="month-card">
            <div class="month-header">
              <div class="month-date">${m.date}</div>
              <div class="month-title">${escapeHTML(m.title || '')}</div>
            </div>
            <div class="month-summary">${escapeHTML(m.trend_summary || '')}</div>
            <div class="month-body">
              <div>
                <div class="month-events-title">▎ 关键事件 (${(m.key_events || []).length})</div>
                <ul class="month-events">
                  ${(m.key_events || []).map(e => `<li>${escapeHTML(e)}</li>`).join("")}
                </ul>
              </div>
              <div>
                <div class="month-aside">
                  <div class="aside-label">关键数据</div>
                  <ul class="data-points">
                    ${(m.data_points || []).map(p => `<li>${escapeHTML(p)}</li>`).join("")}
                  </ul>
                  ${m.look_ahead ? `
                    <div class="look-ahead">
                      <span class="look-ahead-label">▎ 展望下月</span>
                      ${escapeHTML(m.look_ahead)}
                    </div>
                  ` : ''}
                </div>
              </div>
            </div>
          </div>
        `).join("")}
      </div>
    </section>
  `;

  const html = `
    <section class="hero">
      <div class="hero-meta">MONTHLY · 截至 ${todayDate} (${todayWeekday}) · 块 1 每周一更新 · 块 2 每月最后一天更新</div>
      <h1>本月脉络 <span class="hl">· 上周摘要 + 已过完月份总结</span></h1>
      <p>${monthly ? escapeHTML(monthly.period_summary || "") : "加载中..."}</p>
    </section>

    ${weekBlock}

    ${monthBlock}
  `;
  document.getElementById("content").innerHTML = html;
}

function escapeHTML(s) { return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]); }
</script>
</body>
</html>
