<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Daily · 本月脉络 · 2026 月度趋势</title>
<style>
  :root {
    --bg: #0a0a0c; --bg-2: #111114; --bg-3: #16161a;
    --line: #1f1f24; --line-2: #2a2a31;
    --text: #e8e6df; --text-dim: #9a9890; --text-mute: #5e5c56;
    --orange: #ff6a1a; --orange-soft: rgba(255, 106, 26, 0.12);
    --cyan: #4adfd1; --cyan-soft: rgba(74, 223, 209, 0.12);
    --magenta: #d65cd1; --magenta-soft: rgba(214, 92, 209, 0.12);
    --green: #6dd47e;
    --mono: "JetBrains Mono", "SF Mono", "Menlo", ui-monospace, monospace;
    --sans: "Inter", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
  .bg-fx { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .bg-fx::before { content: ""; position: absolute; inset: 0;
    background-image: linear-gradient(rgba(255, 106, 26, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 106, 26, 0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(ellipse at top, black 0%, transparent 70%);
  }
  .bg-fx::after { content: ""; position: absolute; top: -200px; left: 50%; transform: translateX(-50%); width: 1200px; height: 600px; border-radius: 50%; background: radial-gradient(ellipse, rgba(255, 106, 26, 0.18), transparent 60%); filter: blur(80px); }
  .wrap { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 0 32px; }

  header { padding: 28px 0; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--line); }
  .logo { font-family: var(--mono); font-size: 14px; letter-spacing: 0.18em; color: var(--text-dim); display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-dot { width: 8px; height: 8px; background: var(--orange); border-radius: 50%; box-shadow: 0 0 12px var(--orange); }
  .nav-links { display: flex; gap: 6px; }
  .nav-links a { font-family: var(--mono); font-size: 12px; color: var(--text-dim); text-decoration: none; padding: 6px 12px; border: 1px solid var(--line-2); border-radius: 6px; }
  .nav-links a:hover { color: var(--orange); border-color: var(--orange); }
  .nav-links a.active { color: var(--bg); background: var(--orange); border-color: var(--orange); }

  /* ==== 上半年主线导读 ==== */
  .annual-hero { margin: 32px 0 24px; padding: 48px; border: 1px solid var(--line); border-radius: 16px; background: linear-gradient(180deg, var(--orange-soft), transparent 60%); position: relative; overflow: hidden; }
  .annual-hero::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--orange), transparent); background-size: 200% 100%; animation: scan 3s linear infinite; }
  @keyframes scan { 0% { background-position: 200% 0;} 100% { background-position: -200% 0;} }
  .annual-meta { font-family: var(--mono); font-size: 12px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.15em; }
  .annual-hero h1 { font-size: 38px; margin: 12px 0 16px; font-weight: 800; letter-spacing: -0.01em; }
  .annual-hero h1 .hl { background: linear-gradient(90deg, var(--orange), var(--orange-glow, var(--orange))); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .annual-hero p { font-size: 15px; color: var(--text); line-height: 1.8; max-width: 920px; }
  .annual-stats { display: flex; gap: 32px; margin-top: 24px; padding-top: 20px; border-top: 1px dashed var(--line-2); flex-wrap: wrap; }
  .annual-stat .v { font-family: var(--mono); font-size: 22px; color: var(--orange); font-weight: 600; }
  .annual-stat .l { font-size: 11px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.15em; margin-top: 2px; }

  /* ==== 月度卡 ==== */
  .months { display: flex; flex-direction: column; gap: 24px; margin: 32px 0; }
  .month-card { border: 1px solid var(--line); border-radius: 12px; padding: 32px; background: var(--bg-2); position: relative; overflow: hidden; transition: 0.2s; }
  .month-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: var(--line-2); }
  .month-card:hover { border-color: var(--orange); transform: translateY(-2px); box-shadow: 0 20px 40px -20px var(--orange-soft); }
  .month-card.current { border-color: var(--orange); background: linear-gradient(180deg, var(--orange-soft), var(--bg-2) 40%); }
  .month-card.current::before { background: var(--orange); }
  .month-header { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
  .month-date { font-family: var(--mono); font-size: 18px; color: var(--cyan); letter-spacing: 0.1em; font-weight: 600; min-width: 110px; }
  .month-title { font-size: 22px; font-weight: 700; flex: 1; }
  .current-badge { font-family: var(--mono); font-size: 10px; padding: 4px 10px; background: var(--orange); color: var(--bg); border-radius: 4px; letter-spacing: 0.1em; }
  .month-summary { font-size: 14px; color: var(--text); line-height: 1.8; margin-bottom: 20px; }
  .month-body { display: grid; grid-template-columns: 1.5fr 1fr; gap: 28px; }
  .month-events-title { font-family: var(--mono); font-size: 11px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 10px; }
  .month-events { list-style: none; padding: 0; }
  .month-events li { font-size: 13px; color: var(--text-dim); line-height: 1.7; padding: 6px 0 6px 18px; position: relative; border-bottom: 1px dashed var(--line); }
  .month-events li:last-child { border-bottom: none; }
  .month-events li::before { content: "▸"; position: absolute; left: 0; color: var(--orange); }

  .month-aside { background: var(--bg-3); border: 1px solid var(--line); border-radius: 8px; padding: 18px; }
  .aside-label { font-family: var(--mono); font-size: 11px; color: var(--cyan); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 12px; }
  .data-points { list-style: none; padding: 0; margin-bottom: 16px; }
  .data-points li { font-family: var(--mono); font-size: 12px; color: var(--text); line-height: 1.6; padding: 4px 0; }
  .data-points li::before { content: "▎ "; color: var(--orange); }
  .look-ahead { font-size: 13px; color: var(--text-dim); line-height: 1.7; padding: 12px; background: var(--orange-soft); border-left: 3px solid var(--orange); border-radius: 4px; }
  .look-ahead-label { font-family: var(--mono); font-size: 10px; color: var(--orange); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 6px; display: block; }

  .empty { padding: 80px 0; text-align: center; color: var(--text-mute); font-family: var(--mono); }
  footer { margin-top: 60px; padding: 24px 0 48px; border-top: 1px solid var(--line); font-family: var(--mono); font-size: 11px; color: var(--text-mute); }

  @media (max-width: 900px) {
    .month-body { grid-template-columns: 1fr; }
    .annual-hero { padding: 32px 24px; }
    .annual-hero h1 { font-size: 28px; }
  }
</style>
</head>
<body>
<div class="bg-fx"></div>
<div class="wrap">
  <header>
    <a href="index.html" class="logo"><span class="logo-dot"></span>AI DAILY · MONTHLY</a>
    <div class="nav-links">
      <a href="index.html">今日</a>
      <a href="weekly.html">本周</a>
      <a href="monthly.html" class="active">本月</a>
      <a href="archive.html">归档</a>
    </div>
  </header>

  <div id="content" class="empty">加载中...</div>
  <footer>© 2026 AI Daily · 本月脉络 · 2026 上半年 AI 圈 6 个月度趋势分析</footer>
</div>

<script>
fetch("data/monthly_archive.json")
  .then(r => r.ok ? r.json() : null)
  .then(d => {
    if (!d) {
      document.getElementById("content").innerHTML = '<div class="empty">月度归档数据加载失败</div>';
      return;
    }
    // 找到今天是哪个月(以 news.json 为准)
    return fetch("data/news.json").then(r => r.json()).then(n => {
      const todayDate = n.date;  // 2026-06-03
      const todayMonth = todayDate.slice(0, 7);  // 2026-06
      render(d, todayMonth);
    }).catch(() => render(d, "2026-06"));
  })
  .catch(err => {
    document.getElementById("content").innerHTML = '<div class="empty">加载失败:' + err.message + '</div>';
  });

function render(d, todayMonth) {
  const months = d.months || [];
  // 月份倒序(最新在最上面)
  const sorted = [...months].sort((a, b) => b.date.localeCompare(a.date));

  const stats = {
    total: months.length,
    totalEvents: months.reduce((s, m) => s + (m.key_events ? m.key_events.length : 0), 0),
    current: todayMonth,
  };

  const html = `
    <section class="annual-hero">
      <div class="annual-meta">${escapeHTML(d.period_label || "2026 上半年 AI 圈主线")} · 6 个月趋势分析</div>
      <h1>本月脉络 <span class="hl">· ${months[0] ? months[0].date : ''} → ${months[months.length-1] ? months[months.length-1].date : ''}</span></h1>
      <p>${escapeHTML(d.period_summary || "")}</p>
      <div class="annual-stats">
        <div class="annual-stat"><div class="v">${stats.total}</div><div class="l">月份覆盖</div></div>
        <div class="annual-stat"><div class="v">${stats.totalEvents}</div><div class="l">关键事件</div></div>
        <div class="annual-stat"><div class="v">$4000 亿+</div><div class="l">巨头投入累计</div></div>
        <div class="annual-stat"><div class="v">3 大 IPO</div><div class="l">下半年资本兑现</div></div>
      </div>
    </section>

    <div class="months">
      ${sorted.map(m => {
        const isCurrent = m.date === stats.current;
        return `
          <div class="month-card ${isCurrent ? 'current' : ''}">
            <div class="month-header">
              <div class="month-date">${m.date}</div>
              <div class="month-title">${escapeHTML(m.title || '')}</div>
              ${isCurrent ? '<span class="current-badge">本月</span>' : ''}
            </div>
            <div class="month-summary">${escapeHTML(m.trend_summary || '')}</div>
            <div class="month-body">
              <div>
                <div class="month-events-title">▎ 关键事件 (${(m.key_events || []).length})</div>
                <ul class="month-events">
                  ${(m.key_events || []).map(e => `<li>${escapeHTML(e)}</li>`).join("")}
                </ul>
              </div>
              <div>
                <div class="month-aside">
                  <div class="aside-label">关键数据</div>
                  <ul class="data-points">
                    ${(m.data_points || []).map(p => `<li>${escapeHTML(p)}</li>`).join("")}
                  </ul>
                  ${m.look_ahead ? `
                    <div class="look-ahead">
                      <span class="look-ahead-label">▎ 展望下月</span>
                      ${escapeHTML(m.look_ahead)}
                    </div>
                  ` : ''}
                </div>
              </div>
            </div>
          </div>
        `;
      }).join("")}
    </div>
  `;
  document.getElementById("content").innerHTML = html;
}

function escapeHTML(s) { return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]); }
</script>
</body>
</html>
