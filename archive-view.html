<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Daily · 快照</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  .badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    padding: 3px 8px;
    background: var(--orange-soft);
    color: var(--orange);
    border: 1px solid var(--orange);
    border-radius: 4px;
    margin-left: 8px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }

  .news-list { display: flex; flex-direction: column; gap: 0; border-top: 1px solid var(--line); }
  .news-item {
    display: grid;
    grid-template-columns: 60px 1fr 140px;
    gap: 16px;
    padding: 20px 16px;
    border-bottom: 1px solid var(--line);
    align-items: start;
    position: relative;
  }
  .news-item.is-rising { background: linear-gradient(90deg, var(--orange-soft), transparent 30%); }
  .news-item.is-rising::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--orange); }
  .rank { font-family: var(--mono); font-size: 18px; color: var(--text-mute); text-align: right; padding-top: 2px; font-weight: 600; }
  .news-item:nth-child(1) .rank, .news-item:nth-child(2) .rank, .news-item:nth-child(3) .rank { color: var(--blue); }
  .news-item.is-rising .rank { color: var(--orange); }
  .body { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .body .title { font-size: 16px; font-weight: 600; line-height: 1.4; }
  .body .summary { font-size: 14px; color: var(--text-dim); line-height: 1.7; }
  .body .tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
  .body .tag { font-family: var(--mono); font-size: 10px; padding: 2px 6px; background: var(--bg-2); color: var(--text-mute); border-radius: 3px; text-transform: uppercase; }
  .heat { text-align: right; font-family: var(--mono); }
  .heat .h { font-size: 14px; color: var(--hot); font-weight: 700; }
  .heat .lvl { font-size: 9px; padding: 1px 5px; border-radius: 3px; display: inline-block; margin-top: 2px; font-weight: 600; }
  .heat .lvl.爆 { color: var(--red); border: 1px solid var(--red); }
  .heat .lvl.热 { color: var(--hot); border: 1px solid var(--hot); }
  .heat .lvl.中 { color: var(--blue); border: 1px solid var(--blue); }
  .heat .lvl.新星 { color: var(--orange); border: 1px solid var(--orange); }
  .heat .c { font-size: 10px; color: var(--text-mute); margin-top: 2px; }

  @media (max-width: 600px) {
    .news-item { grid-template-columns: 36px 1fr 70px; gap: 10px; padding: 14px 8px; }
    .body .title { font-size: 14px; }
    .body .summary { font-size: 13px; }
    .heat .h { font-size: 12px; }
  }
</style>
</head>
<body>
<div class="top-stripe"></div>
<div class="wrap">
  <header>
    <a href="index.html" class="logo">
      <span class="logo-mark">AI</span>
      <span class="logo-text">
        <span class="t1">AI Daily</span>
        <span class="t2">· 归档快照</span>
      </span>
    </a>
    <button class="nav-toggle" id="nav-toggle" aria-label="菜单">≡</button>
    <nav class="nav" id="nav">
      <a href="index.html">今日</a>
      <a href="monthly.html">本月</a>
      <a href="archive.html" class="active">归档</a>
      <a href="feed.html" class="rss-link">⚡ 订阅</a>
    </nav>
  </header>

  <div id="content" class="loading">加载中...</div>
  <footer>© 2026 AI Daily · 归档快照</footer>
</div>

<script>
const params = new URLSearchParams(location.search);
const date = params.get("date");
const content = document.getElementById("content");

if (!date) {
  content.innerHTML = '<div class="empty">缺少 date 参数。例:archive-view.html?date=2026-06-04</div>';
} else {
  Promise.all([
    fetch(`data/archive/${date}.json`),
    fetch("data/terms.json").then(r => r.ok ? r.json() : {}).catch(() => ({}))
  ]).then(([arcRes, terms]) => {
    if (!arcRes.ok) throw new Error(`HTTP ${arcRes.status}`);
    return arcRes.json().then(data => render(normalize(data, terms)));
  })
    .then(() => {
      const btn = document.getElementById("nav-toggle");
      const nav = document.getElementById("nav");
      if (btn) {
        btn.addEventListener("click", () => nav.classList.toggle("open"));
        nav.querySelectorAll("a").forEach(a => a.addEventListener("click", () => nav.classList.remove("open")));
      }
    })
    .catch(err => {
      content.innerHTML = `<div class="empty">未找到 ${date} 的归档(可能还没生成):${err.message}</div>`;
    });
}

// 补齐旧归档缺失字段(tags/terms/time/rank)
function normalize(data, termsDict) {
  const dateStr = data.date || '';
  const termKeys = Object.keys(termsDict || {});
  data.items = (data.items || []).map((it, i) => {
    const rank = it.rank || (i + 1);
    const tags = (it.tags && it.tags.length > 0) ? it.tags : ((it.heat && it.heat.sources) || []).slice(0, 3);
    const blob = (it.title + ' ' + (it.summary || '')).toLowerCase();
    const terms = (it.terms && it.terms.length > 0) ? it.terms
      : termKeys.filter(k => blob.includes(k.toLowerCase())).slice(0, 4);
    return { ...it, rank, tags, terms };
  });
  return data;
}

function render(data) {
  const items = data.items || [];
  const html = `
    <section class="hero">
      <div class="hero-meta">SNAPSHOT · ${data.date} · ${data.weekday || ''} · ${data.generated_at || ''}</div>
      <h1>${data.date} <span class="hl">${data.weekday || ''}</span><span class="badge">HISTORICAL</span></h1>
      <p class="lead">${escapeHTML(data.summary || "(无摘要)")}</p>
    </section>
    <div class="news-list">
      ${items.map(it => {
        const isRising = it.category === "rising";
        const heat = it.heat || {};
        return `
          <div class="news-item ${isRising ? 'is-rising' : ''}">
            <div class="rank">${(it.rank || 0).toString().padStart(2, '0')}</div>
            <div class="body">
              <div class="title">${escapeHTML(it.title)}</div>
              <div class="summary">${escapeHTML(it.summary)}</div>
              <div class="tags">${(it.tags || []).slice(0, 3).map(t => `<span class="tag">${escapeHTML(t)}</span>`).join('')}</div>
            </div>
            <div class="heat">
              <div class="h">▲ ${heat.score || 0}</div>
              <span class="lvl ${heat.level || '中'}">${heat.level || '中'}</span>
              <div class="c">💬 ${it.comments || 0}</div>
            </div>
          </div>
        `;
      }).join("")}
    </div>
  `;
  content.innerHTML = html;
}

function escapeHTML(s) { return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]); }
</script>
</body>
</html>
