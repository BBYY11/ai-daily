name: AI Daily Fallback (OpenAI)

# Workflow 当主 cron 失败时接管, 用 OpenAI 重新生成早报
# 触发时间 每天北京时间 8:15 对应 UTC 0:15, 在主 cron 8:00 后 15 分钟
on:
  schedule:
    - cron: '15 0 * * *'
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ai-daily-fallback
  cancel-in-progress: false

jobs:
  fallback:
    name: Check main cron + generate via OpenAI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if main cron already generated today
        id: check_main
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          if [ -f "data/news.json" ]; then
            NEWS_DATE=$(python3 -c "import json; print(json.load(open('data/news.json')).get('date',''))")
          else
            NEWS_DATE=""
          fi
          echo "today_utc=$TODAY"
          echo "news_date=$NEWS_DATE"
          if [ "$NEWS_DATE" = "$TODAY" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Run OpenAI fallback generator
        if: steps.check_main.outputs.skip != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 scripts/fallback.py

      - name: Validate news.json
        if: steps.check_main.outputs.skip != 'true'
        run: |
          python3 scripts/validate_news.py

      - name: Generate feeds
        if: steps.check_main.outputs.skip != 'true'
        run: |
          python3 scripts/gen_feed.py
          python3 scripts/gen_json_feed.py
          python3 scripts/gen_digest.py

      - name: Archive to data/archive and weekly
        if: steps.check_main.outputs.skip != 'true'
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          cp data/news.json "data/archive/${TODAY}.json"
          python3 -c "
          import json, os
          idx_path = 'data/archive/index.json'
          idx = json.load(open(idx_path)) if os.path.exists(idx_path) else {'dates': []}
          today = '$TODAY'
          if today not in idx.get('dates', []):
              idx.setdefault('dates', []).append(today)
              idx['dates'].sort()
              json.dump(idx, open(idx_path, 'w'), ensure_ascii=False, indent=2)
          "

      - name: Commit and push
        if: steps.check_main.outputs.skip != 'true'
        run: |
          git config user.email "fallback-bot@MiniMax.ai"
          git config user.name "AI Daily Fallback (OpenAI)"
          git add data/news.json data/feed.xml data/feed.json digest.md data/archive/
          git commit -m "ai-daily auto-update $(date -u +%Y-%m-%d) OpenAI Fallback"
          git push
